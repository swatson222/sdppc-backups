name: SDPPC Daily Backup

on:
  schedule:
    - cron: '0 5 * * *'  # 10 PM Pacific (UTC-7)
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and save backup
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          from datetime import datetime, timezone

          url = "https://ivuuwcrobplhfuuuapcn.supabase.co/rest/v1/store_data?id=eq.sdppc_main&select=data,updated_at"
          headers = {
            "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2dXV3Y3JvYnBsaGZ1dXVhcGNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjQyOTksImV4cCI6MjA5MTI0MDI5OX0.QfOKhoAKX9zPFzuzWujdFaGZRD4R9ml4BXSsWLYI9ZY",
            "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2dXV3Y3JvYnBsaGZ1dXVhcGNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjQyOTksImV4cCI6MjA5MTI0MDI5OX0.QfOKhoAKX9zPFzuzWujdFaGZRD4R9ml4BXSsWLYI9ZY"
          }

          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
            rows = json.loads(resp.read())

          if not rows:
            print("ERROR: No data returned from Supabase")
            exit(1)

          db = rows[0]["data"]
          now = datetime.now(timezone.utc)
          today = now.strftime("%Y-%m-%d")

          backup = {
            "backup_date": today,
            "backup_timestamp": now.isoformat(),
            "inventory_count": len(db.get("inventory", [])),
            "users_count": len(db.get("users", [])),
            "data": db
          }

          os.makedirs("backups", exist_ok=True)
          filename = f"backups/SDPPC_Backup_{today}.json"
          with open(filename, "w") as f:
            json.dump(backup, f, indent=2)

          print(f"✓ Backup saved: {filename}")
          print(f"  Inventory items: {backup['inventory_count']}")
          print(f"  Users: {backup['users_count']}")
          print(f"  Timestamp: {backup['backup_timestamp']}")
          PYEOF

      - name: Commit and push backup
        run: |
          git config user.name "SDPPC Backup Bot"
          git config user.email "backup@sdppc.local"
          git add backups/
          git diff --staged --quiet || git commit -m "Daily backup $(date +%Y-%m-%d)"
          git push
